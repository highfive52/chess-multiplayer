<body>
  <div id="server-loader">
    <div class="spinner"></div>
    <h2>Waking Up Game Server...</h2>
    <p>
      Hosting on a free hobby instance. This cold-start can take 30 to 60 seconds if the server was
      asleep. Thanks for your patience!
    </p>
  </div>

  <div id="app">
    <div id="app-container">
      <div id="match-hud">
        <div class="hud-item">Identity: <span id="player-identity">Connecting...</span></div>
        <div class="hud-item">Status: <span id="turn-indicator">Waiting...</span></div>
      </div>

      <div id="chess-board">
        <div id="board-loader">Synchronizing Live Board State...</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
