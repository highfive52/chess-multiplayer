# .pre-commit-config.yaml (at the repository root)
repos:
  # --- PYTHON BACKEND TOOLS ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff         # Python Linter (Catches bugs)
        files: ^backend/
      - id: ruff-format  # Python Formatter (Replaces Black)
        files: ^backend/

  # --- TYPESCRIPT FRONTEND TOOLS ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier     # Frontend Formatter (HTML/CSS/TS)
        files: ^frontend/
        additional_dependencies: ['prettier@3.1.0']

  # --- TESTS ---
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest -q
        language: python
        pass_filenames: false
        additional_dependencies:
          - pytest>=7.0.0
          - fastapi>=0.136.3
          - python-socketio>=5.16.2
          - redis>=8.0.0
        files: ^backend/
  # --- FRONTEND LINT (uses project local node_modules) ---
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint frontend
        entry: npm --prefix frontend run lint --silent
        language: system
        pass_filenames: false
        always_run: true